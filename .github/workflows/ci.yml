name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate JSON
        run: |
          for f in .claude-plugin/plugin.json .claude-plugin/marketplace.json hooks/hooks.json; do
            echo "Validating $f"
            node -e "JSON.parse(require('fs').readFileSync('$f', 'utf8'))" || exit 1
          done

      - name: Hook syntax check
        run: node --check hooks/session-start-reminder.js

      - name: Codex runner syntax check
        run: node --check scripts/codex-run.js

      - name: Hook smoke test
        run: node hooks/session-start-reminder.js

      - name: Codex runner smoke test (no codex installed)
        env:
          MMT_CODEX_BIN: /nonexistent/codex
        run: |
          # codex 미설치 환경에서 --check 는 NOT_FOUND + exit 2 여야 한다.
          status=0
          node scripts/codex-run.js --check || status=$?
          test "$status" -eq 2 || { echo "expected exit 2, got $status"; exit 1; }

          # 잘못된 role 은 usage 오류(exit 1).
          status=0
          node scripts/codex-run.js --role bogus </dev/null || status=$?
          test "$status" -eq 1 || { echo "expected exit 1, got $status"; exit 1; }

          echo "codex-run.js error paths OK"
